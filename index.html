<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body{
            background-color:black;
        }
        .card{
            margin-bottom: 20px;
            background-color: palevioletred;
            align-items: center;
        }
        .card img{
            width: 250px;
            height: 250px;
        }
        .card-title{
            font-size: 20px;
            font-weight: bold;
        }
        .card-text{
            color: blueviolet;

        }
</style>
</head>

            </div>

                </div>
            </div>
            <div class="col-md-4 col-sm-6 col-12">

                    <img src="face cream from mama earth.jpg" class="card-img-top" alt="Face cream">

                        <div class="card-title">face scrub</div>
                        <p class="card-text">Rs.1000</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4 col-sm-6 col-12">
                <div class="card">
                    <img src="face toner.jpg" class="card-img-top" alt="face toner">

            </div>
            <div class="col-md-4 col-sm-6 col-12">
                <div class="card">

                    <div class="card-body text-center">

                </div>
            </div>
                </div>
            </div>
